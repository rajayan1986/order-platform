version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - order-platform

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Single listener: each listener name must bind to a different port
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # Single broker: internal topics must use replication factor 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - order-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: on-failure
    networks:
      - order-platform

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - order-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - order-platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - order-platform

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - order-platform

  eureka-service:
    build: ./eureka-service
    container_name: eureka-service
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: eureka-service
    networks:
      - order-platform

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      eureka-service:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka/
      EUREKA_INSTANCE_PREFERIPADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: gateway-service
    networks:
      - order-platform

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - order-platform

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8087:8087"
      - "4000:4000"   # Glowroot APM UI (when agent enabled)
    depends_on:
      eureka-service:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      SERVER_PORT: 8087
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka/
      EUREKA_INSTANCE_PREFERIPADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: order-service
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/orderdb
      SPRING_R2DBC_USERNAME: orderuser
      SPRING_R2DBC_PASSWORD: orderpass
      SPRING_R2DBC_POOL_INITIAL_SIZE: 10
      SPRING_R2DBC_POOL_MAX_SIZE: 50
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: order-platform-secret-key-2024
      # Rate limit: 10000/min for bulk ingestion (scripts/bulk-ingest-orders); default in app is 100
      APP_RATE_LIMIT_REQUESTS_PER_MINUTE: "10000"
      IDEMPOTENCY_TTL_SECONDS: 60
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      # Glowroot APM: agent enabled; place glowroot.jar in order-service/glowroot/; UI at http://localhost:4000
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/glowroot/glowroot.jar"
    volumes:
      - ./order-service/glowroot:/opt/glowroot
    networks:
      - order-platform

  processing-service:
    build: ./processing-service
    container_name: processing-service
    ports:
      - "8088:8088"
    depends_on:
      eureka-service:
        condition: service_started
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      SERVER_PORT: 8088
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka/
      EUREKA_INSTANCE_PREFERIPADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: processing-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: orderuser
      SPRING_DATASOURCE_PASSWORD: orderpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: order-platform-secret-key-2024
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    networks:
      - order-platform

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8089:8089"
    depends_on:
      eureka-service:
        condition: service_started
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
    environment:
      SERVER_PORT: 8089
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8761/eureka/
      EUREKA_INSTANCE_PREFERIPADDRESS: "false"
      EUREKA_INSTANCE_HOSTNAME: notification-service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ORDER_SERVICE_URL: http://order-service:8087
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
    networks:
      - order-platform

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - gateway-service
    environment:
      ORDER_SERVICE_URL: http://order-service:8087
      NOTIFICATION_WS_URL: ws://notification-service:8089
    networks:
      - order-platform

networks:
  order-platform:
    driver: bridge

volumes:
  pgdata:
