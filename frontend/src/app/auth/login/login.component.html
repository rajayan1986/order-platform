<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Order Platform</mat-card-title>
      <mat-card-subtitle>Sign in</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error>Username is required</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error>Password is required</mat-error>
        </mat-form-field>
        <p class="hint">Use admin/admin123 or user/user123</p>
        @if (error) {
          <p class="error">{{ error }}</p>
        }
        <button mat-raised-button color="primary" type="submit" [disabled]="loading" class="full-width">
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
